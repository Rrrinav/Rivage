syntax = "proto3";

package system;
option go_package = "dist-system/proto";

// Define the phases of our MapReduce pipeline
enum TaskType {
  UNKNOWN = 0;
  MAP = 1;
  REDUCE = 2;
}

// -----------------------------------------------------
// Message FROM: Executor (Worker)
// Message TO:   Coordinator (Master)
// -----------------------------------------------------
message ExecutorMessage {
  oneof payload {
    RegistrationRequest register = 1;
    TaskResult result = 2;
    Heartbeat heartbeat = 3;  // NEW: Real-time telemetry
  }
}

message RegistrationRequest {
  string worker_id = 1; 
  int32 cpu_cores = 2;
  int64 available_ram = 3;
}

// NEW: Sent periodically by the worker to prove it is alive
message Heartbeat {
  string worker_id = 1;
}

message TaskResult {
  string task_id = 1;
  string job_id = 2;
  TaskType task_type = 3;
  bool success = 4;
  bytes output_data = 5;
  string error_log = 6;
}

// -----------------------------------------------------
// Message FROM: Coordinator (Master)
// Message TO:   Executor (Worker)
// -----------------------------------------------------
message CoordinatorMessage {
  Task task = 1;
}

message Task {
  string task_id = 1;
  string job_id = 2;
  TaskType task_type = 3;
  string command = 4;
  repeated string args = 5;
  bytes input_data = 6;
}

// -----------------------------------------------------
// RPC Service
// -----------------------------------------------------
service Coordinator {
  rpc RegisterAndStream(stream ExecutorMessage) returns (stream CoordinatorMessage);
}
