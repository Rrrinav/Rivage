syntax = "proto3";

package system;

option go_package = "dist-system/proto";

// Enums
enum TaskType {
  MAP    = 0;
  REDUCE = 1;
}

// Worker to Coordinator

message ExecutorMessage {
  oneof payload {
    RegistrationRequest register = 1;
    TaskResult          result   = 2;
  }
}

message RegistrationRequest {
  string worker_id     = 1;
  int32  cpu_cores     = 2;
  int64  available_ram = 3;
}

message TaskResult {
  string   task_id    = 1;
  string   job_id     = 2;   // NEW: no more string hacking to find the job
  TaskType task_type  = 3;   // NEW: coordinator knows what phase this result is from
  bool     success    = 4;
  bytes    output_data = 5;
  string   error_log  = 6;
}

// Coordinator to Worker

message CoordinatorMessage {
  Task task = 1;
}

message Task {
  string          task_id    = 1;
  string          job_id     = 2;   // NEW: ties this task back to a job
  TaskType        task_type  = 3;   // NEW: MAP, REDUCE, etc.
  string          command    = 4;   // e.g. "python3"
  repeated string args       = 5;   // e.g. ["tasks/map.py"]
  bytes           input_data = 6;   // JSON piped to STDIN
}

// Service

service Coordinator {
  rpc RegisterAndStream(stream ExecutorMessage) returns (stream CoordinatorMessage);
}
